name: Build, Update docker-compose.yaml
on:
  workflow_dispatch:
  push:
    branches:
    - main
env:
  REPOSITORY: rohitkalyan.in
jobs:
  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-output.outputs.image_tag }}
      image_full: ${{ steps.set-output.outputs.image_full }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Docker 
      uses: docker/setup-buildx-action@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    
    - name: Extract the Image Metadata
      id: meta 
      uses: docker/metadata-action@v5
      with: 
        images: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPOSITORY }}
        tags: |
          type=sha, format=long 

    - name: Build Docker Image
      uses: docker/build-push-action@v6.19.2
      with:
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
      
    - name: Setup outputs
      id: set-output 
      run: |
        echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
        echo "image_full=${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPOSITORY }}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
  
  update-compose:
    name: Update docker-compose.yaml file
    needs:
    - docker 
    runs-on: ubuntu-latest 
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Git Config Setup 
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
    
    - name: docker-compose update 
      env:
        NEW_IMAGE: ${{ needs.docker.outputs.image_full }}
      run: |
        sed -i "s|image: .*|image: ${NEW_IMAGE}|" docker-compose.yaml 
        echo "Updated the new tag in the docker-compose.yaml file"
        grep -n 'image' docker-compose.yaml 

    - name: Commit K8 Changes
      run: |
        git add docker-compose.yaml 
        git commit -m "Updated the image tag to ${{ needs.docker.outputs.image_tag }}" || echo 'No changes to commit'
        git push 
    

