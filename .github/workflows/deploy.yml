name: Deploy Docker Compose

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Build, Update docker-compose.yaml"
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy using Docker Compose
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Join Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Wait for Tailscale connection
        run: sleep 5

      - name: Debug Tailscale status
        run: |
          tailscale status
          tailscale ip

      - name: Check server connectivity
        run: |
          ping -c 4 ${{ secrets.TAILSCALE_SERVER_IP }}
          nc -zv ${{ secrets.TAILSCALE_SERVER_IP }} 22

      - name: Test SSH connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -o StrictHostKeyChecking=no deploy@${{ secrets.TAILSCALE_SERVER_IP }} "echo SSH connection successful"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TAILSCALE_SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          debug: true
          script: |
            echo "Connected to server"
            sudo /usr/local/bin/deploy/deploy-rohitkalyan.sh
