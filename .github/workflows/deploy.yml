name: Deploy Docker Compose

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Build, Update docker-compose.yaml"
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy using Docker Compose
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Join Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Wait for Tailscale connection
        run: sleep 5

      - name: Check server connectivity
        run: |
          ping -c 4 ${{ secrets.TAILSCALE_SERVER_IP }}
          nc -zv ${{ secrets.TAILSCALE_SERVER_IP }} 22
          ssh-keyscan -v ${{ secrets.TAILSCALE_SERVER_IP }} || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TAILSCALE_SERVER_IP }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Connected to server"
            sudo /usr/local/bin/deploy/deploy-rohitkalyan.sh
