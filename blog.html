<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing — Rohit Kalyan Kandulapati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>

    /* ── site nav ── */
    .site-nav {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    .site-nav a {
      font-size: 0.65rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }
    .site-nav a:hover { color: var(--fg); }
    .site-nav a.active { color: var(--accent); }
    .site-nav a.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 1px;
      background: var(--accent);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --fg: #e8e4dc;
      --muted: #5a5650;
      --accent: #c8b89a;
      --line: #1f1e1c;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist Mono', monospace;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 4rem 1.5rem;
      letter-spacing: -0.01em;
    }

    main {
      width: 100%;
      max-width: 560px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.7s ease forwards 0.1s;
    }

    @keyframes rise {
      to { opacity: 1; transform: none; }
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      transition: color 0.2s;
    }

    .back:hover { color: var(--accent); }

    .back svg {
      width: 10px;
      height: 10px;
      transition: transform 0.2s;
    }

    .back:hover svg { transform: translateX(-3px); }

    .page-title {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .page-title em {
      font-style: italic;
      color: var(--accent);
    }

    .page-sub {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin-bottom: 2.5rem;
    }

    /* ── Post list ── */
    .posts {
      list-style: none;
    }

    .post-item {
      border-bottom: 1px solid var(--line);
      animation: rise 0.5s ease both;
    }

    .post-item:first-child { border-top: 1px solid var(--line); }

    .post-item:nth-child(1) { animation-delay: 0.15s; }
    .post-item:nth-child(2) { animation-delay: 0.22s; }
    .post-item:nth-child(3) { animation-delay: 0.29s; }
    .post-item:nth-child(4) { animation-delay: 0.36s; }
    .post-item:nth-child(5) { animation-delay: 0.43s; }

    .post-link {
      display: block;
      padding: 1.4rem 0;
      text-decoration: none;
      color: inherit;
    }

    .post-link:hover .post-heading { color: var(--accent); }
    .post-link:hover .arrow { transform: translateX(4px); opacity: 1; }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .post-date {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .post-tag {
      font-size: 0.58rem;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .post-heading-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }

    .post-heading {
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--fg);
      transition: color 0.2s;
    }

    .arrow {
      flex-shrink: 0;
      opacity: 0;
      transition: transform 0.2s, opacity 0.2s;
      color: var(--accent);
    }

    .arrow svg { width: 12px; height: 12px; display: block; }

    .post-excerpt {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.7;
      margin-top: 0.5rem;
      max-width: 460px;
    }

    /* ── Empty state ── */
    .empty {
      padding: 2.5rem 0;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .empty strong {
      display: block;
      color: #3a3834;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--line);
      font-size: 0.62rem;
      color: #3a3834;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<main>
  <nav class="site-nav">
    <a href="/">home</a>
    <a href="/blog" class="active">blog</a>
  </nav>

  <h1 class="page-title">Notes on<br><em>infrastructure</em></h1>
  <p class="page-sub">DevOps · Kubernetes · AWS · Automation · CI/CD</p>

  <div class="divider"></div>

  <!--
  ════════════════════════════════════════════════
  HOW TO ADD A NEW POST — every time you write one:

  1. Copy posts/post-template.html
     Rename it:  posts/your-post-slug.html
     Fill in the title, date, tag, and content.

  2. Paste this block at the TOP of the <ul> below:

    <li class="post-item">
      <a href="/blog/your-post-slug" class="post-link">
        <div class="post-meta">
          <span class="post-date">Month YYYY</span>
          <span class="post-tag">Tag</span>
        </div>
        <div class="post-heading-row">
          <span class="post-heading">Your Post Title Here</span>
          <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
        </div>
        <p class="post-excerpt">One sentence describing what the post is about.</p>
      </a>
    </li>

  3. Upload both files to your server. Done.
  ════════════════════════════════════════════════
  -->

  <ul class="posts" id="post-list">
    <li class="post-item" style="border-top:1px solid var(--line)">
      <div class="post-link" style="padding:1.4rem 0; font-size:0.72rem; color:var(--muted)">no posts yet — check back soon.</div>
    </li>
  </ul>



  <div class="footer">Rohit Kalyan Kandulapati &nbsp;·&nbsp; Writing</div>
</main>

<script data-cfasync="false">
    // Fetches posts/ directory via nginx autoindex JSON and renders all posts newest-first.
    //
    // NGINX CONFIG REQUIRED — add to your server block:
    //
    //   location /posts/ {
    //     autoindex on;
    //     autoindex_format json;
    //   }

    (async () => {
      const list = document.getElementById('post-list');
      const arrow = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

      try {
        const res = await fetch('/posts-json/');
        if (!res.ok) throw new Error('autoindex not enabled');
        const files = await res.json();

        const posts = files
          .filter(f => f.name.endsWith('.html') && f.name !== 'post-template.html')
          .sort((a, b) => new Date(b.mtime) - new Date(a.mtime));

        if (posts.length === 0) {
          list.innerHTML = `<li class="post-item" style="border-top:1px solid var(--line)">
            <div class="post-link" style="padding:1.4rem 0;font-size:0.72rem;color:var(--muted)">
              no posts yet — check back soon.
            </div></li>`;
          return;
        }

        // fetch each post to extract meta tags
        const postData = await Promise.all(posts.map(async (f, i) => {
          const slug = f.name.replace('.html', '');
          const title = slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
          const date = new Date(f.mtime).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
          let tags = [];
          try {
            const r = await fetch('/blog/' + f.name);
            const html = await r.text();
            const match = html.match(/<meta name="tags" content="([^"]+)"/);
            if (match) tags = match[1].split(',').map(t => t.trim());
          } catch(e) {}
          return { f, title, date, tags, i };
        }));

        list.innerHTML = postData.map(({ f, title, date, tags, i }) => {
          const tagHtml = tags.map(t => `<span class="post-tag">${t}</span>`).join('');
          return `
            <li class="post-item" style="animation-delay:${0.15 + i * 0.07}s">
              <a href="/blog/${f.name}" class="post-link">
                <div class="post-meta">
                  <span class="post-date">${date}</span>
                  ${tagHtml}
                </div>
                <div class="post-heading-row">
                  <span class="post-heading">${title}</span>
                  <span class="arrow">${arrow}</span>
                </div>
              </a>
            </li>`;
        }).join('');

      } catch (e) {
        list.innerHTML = `<li class="post-item" style="border-top:1px solid var(--line)">
          <div class="post-link" style="padding:1.4rem 0;font-size:0.72rem;color:var(--muted)">
            no posts yet — check back soon.
          </div></li>`;
        console.warn('Blog fetch failed:', e.message);
      }
    })();
  </script>
</body>
</html>
