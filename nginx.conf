server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Homepage → index.html ──────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    # ── Blog index → blog.html ─────────────────────────────
    location = /blog {
        try_files /blog.html =404;
    }

    # ── Individual posts → /blog/post-slug (no .html needed)
    # e.g. domain/blog/post-01-test serves posts/post-01-test.html
    location /blog/ {
        alias /usr/share/nginx/html/posts/;
        try_files $uri $uri.html =404;
    }

    # ── Autoindex JSON for posts/ directory ────────────────
    # Used by index.html and blog.html to list posts dynamically.
    # Accessed internally at /posts-json/ — not a browsable URL.
    location /posts-json/ {
        alias /usr/share/nginx/html/posts/;
        autoindex on;
        autoindex_format json;
        # Block direct browser access — only fetch() from your pages
        add_header X-Robots-Tag "noindex" always;
    }

    # ── Block direct access to /posts/ directory ───────────
    # Posts are served via /blog/ — this prevents double access
    location /posts/ {
        return 301 /blog/;
    }
}
